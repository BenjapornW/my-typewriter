<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typewriter</title>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Indie+Flower&family=Patrick+Hand&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --bg:  #f0ede8;
    --paper: #ffffff;
    --accent: rgba(210,80,80,0.22);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Indie Flower', cursive;
    transition: background 0.4s;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Paper */
  .paper-wrap {
    position: relative;
    width: 292px;
    z-index: 2;
    margin-bottom: -2px;
  }

  .paper-sheet {
    width: 100%;
    min-height: 240px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-bottom: none;
    position: relative;
    padding: 24px 22px 10px 46px;
    transition: background 0.4s, border-color 0.4s;
  }

  .paper-sheet::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 38px;
    width: 1px;
    background: var(--accent);
    pointer-events: none;
  }

  .paper-sheet::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 26px,
      rgba(0,0,0,0.07) 26px,
      rgba(0,0,0,0.07) 27px
    );
    pointer-events: none;
  }

  textarea {
    width: 100%;
    min-height: 200px;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Architects Daughter', cursive;
    font-size: 16px;
    line-height: 27px;
    color: var(--ink);
    caret-color: var(--ink);
    letter-spacing: 0.03em;
    position: relative;
    z-index: 1;
    overflow: hidden;
    transition: color 0.4s;
  }

  textarea::placeholder { color: #ccc; font-style: italic; }

  /* SVG machine */
  .machine-svg {
    display: block;
    width: 460px;
    overflow: visible;
  }

  .key-cap {
    fill: var(--paper);
    stroke: var(--ink);
    stroke-width: 1.4;
    transition: fill 0.06s, stroke 0.4s;
    cursor: pointer;
  }
  .key-label {
    fill: var(--ink);
    font-family: 'Indie Flower', cursive;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    transition: fill 0.06s;
    user-select: none;
  }
  .key-group.pressed .key-cap { fill: var(--ink); }
  .key-group.pressed .key-label { fill: var(--paper); }
  .key-group { cursor: pointer; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
  }

  .tool-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--paper);
    border: 1.4px solid var(--ink);
    border-radius: 20px;
    font-family: 'Indie Flower', cursive;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.12s, color 0.12s, border-color 0.4s;
    user-select: none;
  }
  .tool-btn:hover { background: var(--ink); color: var(--paper); }
  .tool-btn:hover svg path, .tool-btn:hover svg rect,
  .tool-btn:hover svg circle, .tool-btn:hover svg polyline { stroke: var(--paper); }

  .tool-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* Color swatches panel */
  .color-panel {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    background: var(--paper);
    border: 1.4px solid var(--ink);
    border-radius: 20px;
    max-width: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-width 0.35s ease, opacity 0.25s ease, padding 0.35s, border-color 0.4s;
    pointer-events: none;
  }
  .color-panel.open {
    max-width: 260px;
    opacity: 1;
    pointer-events: all;
  }

  .swatch {
    width: 17px;
    height: 17px;
    border-radius: 50%;
    border: 1.5px solid transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s, border-color 0.15s;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.active { border-color: var(--ink); transform: scale(1.15); }

  /* Stats */
  .stats-bar {
    margin-top: 0;
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.12em;
    font-family: 'Indie Flower', cursive;
  }

  /* Flash on snapshot */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.05s;
  }
  .flash-overlay.snap { opacity: 0.85; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--ink);
    color: var(--paper);
    font-family: 'Indie Flower', cursive;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 8px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>
<div class="toast" id="toast">snapshot saved ✓</div>

<div class="scene" id="scene">
  <div class="paper-wrap">
    <div class="paper-sheet" id="paperSheet">
      <textarea
        id="writer"
        placeholder="write something cute ♡"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        rows="8"
      ></textarea>
    </div>
  </div>

  <svg class="machine-svg" id="machineSvg" viewBox="0 0 460 230" xmlns="http://www.w3.org/2000/svg">
    <!-- Platen -->
    <rect x="55" y="0" width="350" height="20" rx="10" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.5"/>
    <circle cx="68"  cy="10" r="7" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.4"/>
    <circle cx="68"  cy="10" r="3" fill="var(--ink)" opacity="0.15"/>
    <circle cx="392" cy="10" r="7" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.4"/>
    <circle cx="392" cy="10" r="3" fill="var(--ink)" opacity="0.15"/>
    <rect x="176" y="2"  width="4" height="16" rx="2" fill="var(--ink)" opacity="0.18"/>
    <rect x="280" y="2"  width="4" height="16" rx="2" fill="var(--ink)" opacity="0.18"/>
    <!-- Body -->
    <rect x="20" y="18" width="420" height="200" rx="14" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.5"/>
    <!-- Face plate -->
    <rect x="100" y="28" width="260" height="62" rx="6" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.3"/>
    <!-- Fan lines -->
    <g stroke="var(--ink)" stroke-width="0.7" opacity="0.3">
      <line x1="230" y1="88" x2="108"  y2="32"/>
      <line x1="230" y1="88" x2="130"  y2="28"/>
      <line x1="230" y1="88" x2="158"  y2="27"/>
      <line x1="230" y1="88" x2="188"  y2="26"/>
      <line x1="230" y1="88" x2="218"  y2="25.5"/>
      <line x1="230" y1="88" x2="248"  y2="25.5"/>
      <line x1="230" y1="88" x2="278"  y2="26"/>
      <line x1="230" y1="88" x2="308"  y2="27"/>
      <line x1="230" y1="88" x2="335"  y2="28"/>
      <line x1="230" y1="88" x2="354"  y2="32"/>
    </g>
    <!-- Feed line -->
    <line x1="100" y1="94" x2="360" y2="94" stroke="var(--ink)" stroke-width="0.8"/>
    <line x1="100" y1="86" x2="360" y2="86" stroke="var(--ink)" stroke-width="0.8" stroke-dasharray="4,3"/>
    <!-- Spools -->
    <circle cx="46"  cy="52" r="18" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.4"/>
    <circle cx="46"  cy="52" r="9"  fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
    <circle cx="46"  cy="52" r="3"  fill="var(--ink)" opacity="0.2"/>
    <circle cx="414" cy="52" r="18" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.4"/>
    <circle cx="414" cy="52" r="9"  fill="var(--paper)" stroke="var(--ink)" stroke-width="1"/>
    <circle cx="414" cy="52" r="3"  fill="var(--ink)" opacity="0.2"/>
    <!-- Keys -->
    <g id="keys"></g>
    <!-- Space bar -->
    <g class="key-group" id="space-key">
      <rect x="148" y="198" width="164" height="13" rx="6.5" class="key-cap"/>
      <text x="230" y="204.5" class="key-label" style="font-size:6px">SPACE</text>
    </g>
    <!-- Foot rail -->
    <rect x="40" y="212" width="380" height="6" rx="3" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.2"/>
  </svg>

  <!-- Toolbar -->
  <div class="toolbar">
    <!-- Snapshot button -->
    <button class="tool-btn" id="snapBtn" title="Save snapshot">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="4" width="14" height="10" rx="2" stroke="var(--ink)" stroke-width="1.4"/>
        <circle cx="8" cy="9" r="2.5" stroke="var(--ink)" stroke-width="1.4"/>
        <path d="M5.5 4 L6.5 2 H9.5 L10.5 4" stroke="var(--ink)" stroke-width="1.4" stroke-linejoin="round"/>
      </svg>
      Snapshot
    </button>

    <!-- Color button -->
    <button class="tool-btn" id="colorBtn" title="Change color">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="8" r="6" stroke="var(--ink)" stroke-width="1.4"/>
        <path d="M8 2 C8 2 12 5 12 8 C12 10.2 10.2 12 8 12 C5.8 12 4 10.2 4 8 C4 5 8 2 8 2Z" stroke="var(--ink)" stroke-width="0.8" opacity="0.4"/>
      </svg>
      Color
    </button>

    <!-- Color panel -->
    <div class="color-panel" id="colorPanel">
    </div>
  </div>

  <div class="stats-bar" id="stats" style="margin-top:12px">0 words · 0 chars</div>
</div>

<script>
// ── Color themes ──
const THEMES = [
  { name: 'Classic',   bg: '#fdf6f0', ink: '#3a3a3a', paper: '#ffffff', accent: 'rgba(255,150,180,0.3)',  swatch: '#3a3a3a' },
  { name: 'Midnight',  bg: '#0e0e12', ink: '#e8e4dc', paper: '#1a1a22', accent: 'rgba(100,140,255,0.25)', swatch: '#1a1a22' },
  { name: 'Forest',    bg: '#e8ede4', ink: '#2d4a2d', paper: '#f4f8f2', accent: 'rgba(80,160,80,0.22)',  swatch: '#2d4a2d' },
  { name: 'Sepia',     bg: '#e8dcc8', ink: '#5c3d1e', paper: '#fdf5e4', accent: 'rgba(180,100,40,0.22)', swatch: '#5c3d1e' },
  { name: 'Slate',     bg: '#d8dde4', ink: '#2a3a4a', paper: '#f0f4f8', accent: 'rgba(80,120,200,0.2)',  swatch: '#2a3a4a' },
  { name: 'Rose',      bg: '#f0e4e8', ink: '#4a1a2a', paper: '#fff5f7', accent: 'rgba(200,60,100,0.2)',  swatch: '#c0385a' },
];

let currentTheme = THEMES[0];

function applyTheme(t) {
  currentTheme = t;
  document.documentElement.style.setProperty('--ink',   t.ink);
  document.documentElement.style.setProperty('--bg',    t.bg);
  document.documentElement.style.setProperty('--paper', t.paper);
  document.documentElement.style.setProperty('--accent',t.accent);
  // update swatch active state
  document.querySelectorAll('.swatch').forEach((s,i) => {
    s.classList.toggle('active', THEMES[i] === t);
  });
}

// Build swatches
const panel = document.getElementById('colorPanel');
THEMES.forEach((t, i) => {
  const s = document.createElement('div');
  s.className = 'swatch' + (i === 0 ? ' active' : '');
  s.title = t.name;
  s.style.background = t.swatch;
  s.style.borderColor = i === 0 ? t.ink : 'transparent';
  s.addEventListener('click', () => applyTheme(t));
  panel.appendChild(s);
});

// Color panel toggle
const colorBtn = document.getElementById('colorBtn');
const colorPanel = document.getElementById('colorPanel');
colorBtn.addEventListener('click', () => {
  colorPanel.classList.toggle('open');
});

// Close panel on outside click
document.addEventListener('click', e => {
  if (!colorBtn.contains(e.target) && !colorPanel.contains(e.target))
    colorPanel.classList.remove('open');
});

// ── Snapshot ──
const snapBtn = document.getElementById('snapBtn');
const flashEl = document.getElementById('flashOverlay');
const toastEl = document.getElementById('toast');

snapBtn.addEventListener('click', async () => {
  colorPanel.classList.remove('open');
  // Flash
  flashEl.classList.add('snap');
  setTimeout(() => flashEl.classList.remove('snap'), 150);

  await new Promise(r => setTimeout(r, 120));

  const scene = document.getElementById('scene');
  const canvas = await html2canvas(scene, {
    backgroundColor: currentTheme.bg,
    scale: 2,
    useCORS: true,
    logging: false,
  });

  // Download
  const link = document.createElement('a');
  const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  link.download = `typewriter-${ts}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();

  // Toast
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2200);
});

// ── Build keyboard rows ──
const ROWS = [
  { y: 110, keys: ['1','2','3','4','5','6','7','8','9','0','-'] },
  { y: 130, keys: ['Q','W','E','R','T','Y','U','I','O','P'] },
  { y: 150, keys: ['A','S','D','F','G','H','J','K','L',';'] },
  { y: 170, keys: ['Z','X','C','V','B','N','M',',','.'] },
];
const R = 8.5, GAP = 21;
const svgNS = 'http://www.w3.org/2000/svg';
const keysG = document.getElementById('keys');
const writer  = document.getElementById('writer');
const statsEl = document.getElementById('stats');
const spaceKey= document.getElementById('space-key');

function makeKey(x, y, label) {
  const g = document.createElementNS(svgNS, 'g');
  g.classList.add('key-group');
  g.dataset.key = label;
  const c = document.createElementNS(svgNS, 'circle');
  c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', R);
  c.classList.add('key-cap');
  const t = document.createElementNS(svgNS, 'text');
  t.setAttribute('x', x); t.setAttribute('y', y);
  t.classList.add('key-label');
  t.textContent = label;
  g.appendChild(c); g.appendChild(t);
  return g;
}

ROWS.forEach(({ y, keys }) => {
  const startX = 230 - ((keys.length - 1) * GAP) / 2;
  keys.forEach((k, i) => {
    const el = makeKey(startX + i * GAP, y, k);
    keysG.appendChild(el);
    el.addEventListener('mousedown', ev => {
      ev.preventDefault();
      writer.focus();
      const ch = k.length === 1 && k.match(/[,.\-;]/) ? k : k.toLowerCase();
      insertAt(ch);
      playClick(); flashKey(el);
      bumpLine(1);
    });
  });
});

spaceKey.addEventListener('mousedown', ev => {
  ev.preventDefault(); writer.focus();
  insertAt(' '); playClick(); flashKey(spaceKey); bumpLine(1);
});

// ── Typing ──
let linePos = 0, LINE_LEN = 38;

function bumpLine(n) {
  linePos += n;
  if (linePos >= LINE_LEN) { playDing(); linePos = 0; }
  resize(); updateStats();
}

writer.addEventListener('keydown', e => {
  playClick(e.key === 'Enter');
  if (e.key === 'Enter') linePos = 0;
  else if (e.key === 'Backspace') linePos = Math.max(0, linePos - 1);
  else if (e.key.length === 1) { bumpLine(1); return; }
  resize(); updateStats();
  const el = keysG.querySelector(`[data-key="${e.key.toUpperCase()}"]`);
  if (el) flashKey(el);
  if (e.key === ' ') flashKey(spaceKey);
});

writer.addEventListener('input', () => { resize(); updateStats(); });

function insertAt(ch) {
  const s = writer.selectionStart, en = writer.selectionEnd;
  writer.value = writer.value.slice(0, s) + ch + writer.value.slice(en);
  writer.selectionStart = writer.selectionEnd = s + ch.length;
}
function resize() {
  writer.style.height = 'auto';
  writer.style.height = writer.scrollHeight + 'px';
}
function updateStats() {
  const t = writer.value;
  const w = t.trim() === '' ? 0 : t.trim().split(/\s+/).length;
  statsEl.textContent = `${w} word${w !== 1 ? 's' : ''} · ${t.length} char${t.length !== 1 ? 's' : ''}`;
}
function flashKey(el) {
  el.classList.remove('pressed');
  void el.getBoundingClientRect();
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 120);
}

// ── Sound ──
let actx;
function ac() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx; }
function playClick(heavy = false) {
  try {
    const a = ac(), dur = 0.05;
    const buf = a.createBuffer(1, a.sampleRate * dur, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++)
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / a.sampleRate * (heavy ? 45 : 95));
    const src = a.createBufferSource(); src.buffer = buf;
    const g = a.createGain(); g.gain.value = heavy ? 0.3 : 0.18;
    src.connect(g); g.connect(a.destination); src.start();
  } catch(e) {}
}
function playDing() {
  try {
    const a = ac();
    const osc = a.createOscillator(), g = a.createGain();
    osc.frequency.value = 1350; osc.type = 'sine';
    g.gain.setValueAtTime(0.22, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.5);
    osc.connect(g); g.connect(a.destination);
    osc.start(); osc.stop(a.currentTime + 0.5);
  } catch(e) {}
}

writer.focus();
</script>
</body>
</html>
